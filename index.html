<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX_GOD | IONIC ULTIMATE V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root {
            --ionic-cyan: #00ffff;
            --ionic-magenta: #ff00ff;
            --bg-obsidian: #000000;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-obsidian); 
            color: #fff; overflow: hidden; 
            font-family: 'Cairo', sans-serif; 
            user-select: none; 
        }

        /* خلفية أيونية متحركة */
        .ionic-glow-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #1a001a 0%, #000 100%);
            animation: bgShift 15s infinite alternate;
        }

        @keyframes bgShift {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .scroll-engine {
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none;
        }
        .scroll-engine::-webkit-scrollbar { display: none; }

        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* الزجاج الأيوني المتطور */
        .glass-ui { 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(30px) saturate(200%); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
        }

        /* تعديل: العلامة المائية في المنتصف (أفخم) */
        .watermark { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            font-family: 'Orbitron'; font-size: 24px; 
            background: linear-gradient(90deg, var(--ionic-cyan), var(--ionic-magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; letter-spacing: 8px; z-index: 50; opacity: 0.2;
            pointer-events: none; text-transform: uppercase;
            animation: pulseWatermark 4s infinite ease-in-out;
        }

        @keyframes pulseWatermark {
            0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* تعديل: أزرار التفاعل على اليسار في المنتصف */
        .action-sidebar { 
            position: absolute; left: 25px; top: 50%; 
            transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 25px; z-index: 100; 
        }

        .action-btn { 
            width: 60px; height: 60px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; position: relative;
        }
        .action-btn:hover { transform: scale(1.2); }
        .action-btn i { font-size: 24px; animation: iconGlow 4s infinite linear; }

        @keyframes iconGlow {
            0%, 100% { color: var(--ionic-cyan); filter: drop-shadow(0 0 5px var(--ionic-cyan)); }
            50% { color: var(--ionic-magenta); filter: drop-shadow(0 0 15px var(--ionic-magenta)); }
        }

        /* تفاصيل الفيديو */
        .v-details { position: absolute; bottom: 135px; left: 100px; right: 30px; z-index: 100; }
        .v-title { 
            font-family: 'Orbitron'; font-size: 20px; font-weight: 900; 
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        /* زر الرفع "النواة" المطلقة */
        #up-trigger { 
            width: 75px; height: 75px; 
            background: linear-gradient(135deg, var(--ionic-cyan), var(--ionic-magenta)); 
            color: #000; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 32px; box-shadow: 0 0 40px rgba(0, 255, 255, 0.6); 
            cursor: pointer; transition: 0.5s; border: 4px solid rgba(255,255,255,0.2);
        }
        #up-trigger:hover { transform: scale(1.1) rotate(180deg); }

        nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 480px; height: 90px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 200; 
        }

        .hashtag { 
            font-size: 13px; color: var(--ionic-cyan); 
            margin-right: 10px; font-weight: bold; 
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="ionic-glow-bg"></div>
    
    <header class="fixed top-8 left-8 right-8 z-[500] flex justify-between items-center pointer-events-none">
        <div class="glass-ui px-8 py-3 pointer-events-auto border-l-4 border-cyan-500">
            <span class="font-[Orbitron] font-black tracking-[4px] text-[18px] text-[#00ffff]">VOX_GOD ELITE V6</span>
        </div>
        <div class="glass-ui p-3 px-8 font-[Orbitron] text-[14px] text-white/80" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav class="glass-ui">
        <div class="cursor-pointer text-white/30 hover:text-white transition" onclick="checkAdmin()">
            <i class="fas fa-fingerprint text-3xl"></i>
        </div>
        <div id="up-trigger"><i class="fas fa-plus"></i></div>
        <div class="cursor-pointer" onclick="openAd(); toggleChat()">
            <i class="fas fa-atom text-[#00ffff] text-4xl animate-spin-slow"></i>
        </div>
    </nav>

    <div id="chat-ov" class="fixed inset-0 z-[600] bg-black/95 backdrop-blur-3xl hidden flex-col p-10">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-[Orbitron] text-[#00ffff] tracking-[8px] text-2xl">NEON_CHAT</h2>
            <i class="fas fa-times text-white/30 text-4xl cursor-pointer hover:text-white" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-6"></div>
        <div class="mt-10 flex gap-4 p-4 glass-ui">
            <input type="text" id="msg-input" class="bg-transparent flex-1 outline-none px-6 text-lg" placeholder="اكتب رسالة مشفرة...">
            <button onclick="sendMsg()" class="bg-cyan-500 text-black px-12 py-5 rounded-3xl font-black hover:bg-white transition">بث</button>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 z-[1000] bg-black/98 backdrop-blur-3xl hidden flex-col p-10">
        <div class="flex justify-between items-center mb-12">
            <h2 class="font-[Orbitron] text-magenta-500 text-4xl font-black italic">ULTIMATE_CORE</h2>
            <button onclick="toggleAdmin()" class="bg-white/5 p-6 rounded-full"><i class="fas fa-times text-3xl"></i></button>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-8"></div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const AD_LINKS = [
            "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec",
            "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        ];
        let currentAd = 0;

        firebase.initializeApp({ databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        function openAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % 2; }
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }
        setInterval(updateClock, 1000);

        function toggleMute(btn, videoId) {
            const v = document.getElementById('vid-' + videoId);
            v.muted = !v.muted;
            btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        }

        db.ref('vox_god_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="watermark">VOX_GOD PRESTIGE</div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                    
                    <div class="v-details">
                        <div class="v-title font-black">@ULTIMATE_IONIC_${id.substring(1, 6)}</div>
                        <div class="flex mt-3">
                            <span class="hashtag">#V6_Ultimate</span>
                            <span class="hashtag">#Prestige</span>
                            <span class="hashtag">#Ionic_Glow</span>
                        </div>
                    </div>

                    <div class="action-sidebar">
                        <div class="action-btn glass-ui" onclick="toggleMute(this, '${id}')">
                            <i class="fas fa-volume-up"></i>
                        </div>
                        <div class="action-btn glass-ui" onclick="openAd(); db.ref('vox_god_content/${id}/likes').transaction(l=>(l||0)+1)">
                            <i class="fas fa-bolt"></i>
                            <span class="text-[12px] font-bold mt-1">${vid.likes || 0}</span>
                        </div>
                        <div class="action-btn glass-ui" onclick="openAd(); toggleChat()">
                            <i class="fas fa-comment-alt"></i>
                        </div>
                        <div class="action-btn glass-ui" onclick="openAd(); navigator.share({url:window.location.href})">
                            <i class="fas fa-share-alt"></i>
                        </div>
                    </div>
                `;
                container.appendChild(section);
                adminList.innerHTML += `
                    <div class="flex items-center gap-8 glass-ui p-6 mb-6 border-r-8 border-magenta-600">
                        <video class="w-28 h-28 rounded-3xl object-cover" src="${vid.url}"></video>
                        <div class="flex-1">
                            <div class="text-[14px] font-mono text-cyan-400">NODE_ID: ${id}</div>
                            <div class="text-[11px] opacity-40 mt-2 italic">SYNCHED: ${new Date(vid.timestamp).toLocaleString()}</div>
                        </div>
                        <button onclick="deleteVideo('${id}')" class="text-red-500 p-6 hover:bg-red-500/20 rounded-full transition"><i class="fas fa-trash-alt text-3xl"></i></button>
                    </div>`;
            });
            initObserver();
        });

        function deleteVideo(id) { if(confirm("تأكيد تدمير هذا العقد في النواة؟")) db.ref('vox_god_content/' + id).remove(); }

        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dqzjfaqg4", 
            uploadPreset: "vox_god", 
            sources: ['local', 'camera'],
            styles: { palette: { window: "#000000", sourceBg: "#000000", windowBorder: "#00ffff", tabIcon: "#00ffff", inactiveTabIcon: "#ffffff", menuIcons: "#ffffff", link: "#00ffff", action: "#ff00ff", inProgress: "#00ffff", complete: "#33ff00", error: "#ea2727", textDark: "#000000", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('vox_god_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
                alert("تم الحقن بنجاح في النواة السادسة!");
            }
        });
        document.getElementById("up-trigger").onclick = () => myWidget.open();

        function toggleChat() { 
            const c = document.getElementById('chat-ov'); 
            c.style.display = (c.style.display === 'flex') ? 'none' : 'flex'; 
        }
        function checkAdmin() { if(prompt("ENTER MASTER KEY:") === MASTER_KEY) toggleAdmin(); }
        function toggleAdmin() { 
            const a = document.getElementById('admin-panel'); 
            a.style.display = (a.style.display === 'flex') ? 'none' : 'flex'; 
        }
        function sendMsg() { 
            const inp = document.getElementById('msg-input'); 
            if(inp.value.trim()){ 
                db.ref('vox_chat').push({user:"SYSTEM", text:inp.value, time: Date.now()}); 
                inp.value=''; 
            } 
        }
        
        db.ref('vox_chat').limitToLast(25).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => { 
                const d = m.val(); 
                box.innerHTML += `
                    <div class="p-6 glass-ui mb-4 border-l-4 border-cyan-500 animate-pulse-slow">
                        <p class="text-xs text-cyan-400 font-black mb-2 uppercase">Core_Signal</p>
                        <p class="text-md leading-relaxed tracking-wide">${d.text}</p>
                    </div>`; 
            });
            box.scrollTop = box.scrollHeight;
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play().catch(()=>{});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }
    </script>
</body>
</html>
