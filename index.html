<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER REALM | PRESTIGE V15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Cairo:wght@200;600&display=swap');
        
        :root {
            --accent: #00ffff; /* سيتغير هذا اللون برمجياً */
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Cairo', sans-serif; overflow: hidden;
            transition: background 0.5s ease;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .scroll-engine {
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none;
        }
        .scroll-engine::-webkit-scrollbar { display: none; }

        .v-realm { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .side-watermark {
            position: fixed; top: 85px; left: 40px;
            z-index: 1000; pointer-events: none;
            font-family: 'Cinzel', serif;
            font-size: 10px; font-weight: 900;
            letter-spacing: 5px; text-transform: uppercase;
            color: rgba(255, 255, 255, 0.2);
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            transition: color 0.5s;
        }

        .sidebar-actions {
            position: absolute; left: 25px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 18px; z-index: 100;
        }

        .action-node {
            width: 58px; height: 58px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s all cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .action-node:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent); transform: scale(1.1); }
        .action-node i { font-size: 20px; color: #fff; opacity: 0.8; transition: color 0.5s; }
        .action-node span { font-size: 10px; margin-top: 4px; font-weight: bold; color: var(--accent); transition: color 0.5s; }

        nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 420px; height: 75px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px; display: flex; justify-content: space-around;
            align-items: center; z-index: 500;
        }

        #up-trigger {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.9); color: #000;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; transition: 0.4s;
        }

        /* لوحة التحكم مع الصور */
        #admin-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000;
            display: none; flex-direction: column; padding: 40px; backdrop-filter: blur(30px);
        }

        .admin-item {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .admin-thumb {
            width: 60px; height: 60px; border-radius: 12px;
            object-fit: cover; border: 1px solid var(--accent);
        }

        .badge-glass {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            padding: 8px 20px; border-radius: 15px; font-family: 'Cinzel'; font-size: 11px; color: var(--accent);
            letter-spacing: 3px; transition: color 0.5s;
        }
    </style>
</head>
<body>

    <div class="side-watermark" id="dynamic-wm">AETHER REALM SYSTEM</div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-[Cinzel] tracking-widest">SYSTEM_ADMIN</h1>
            <button onclick="toggleAdmin()" class="text-white opacity-40 hover:opacity-100"><i class="fas fa-times text-2xl"></i></button>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-4"></div>
    </div>

    <header class="fixed top-10 w-full flex justify-between px-10 z-[1000] pointer-events-none">
        <div class="badge-glass pointer-events-auto" id="main-badge">AETHER_V15</div>
        <div class="badge-glass" id="clock" style="color:white">00:00</div>
    </header>

    <main class="scroll-engine" id="video-feed"></main>

    <nav>
        <i class="fas fa-fingerprint text-xl opacity-20 hover:opacity-100 cursor-pointer" onclick="checkAdmin()"></i>
        <div id="up-trigger"><i class="fas fa-plus"></i></div>
        <i class="fas fa-bullseye text-xl opacity-20 hover:opacity-100 cursor-pointer text-cyan-400" id="chat-btn" onclick="toggleChat()"></i>
    </nav>

    <div id="chat-ov" class="fixed inset-0 z-[600] bg-black/98 backdrop-blur-3xl hidden flex-col p-10">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-[Cinzel] tracking-[10px] text-white/30">REALM_PULSE</h2>
            <i class="fas fa-times text-3xl cursor-pointer opacity-30" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-5 flex gap-3 p-3 bg-white/5 rounded-2xl border border-white/10">
            <input type="text" id="msg-input" class="bg-transparent flex-1 outline-none px-4" placeholder="Transmit message...">
            <button onclick="sendMsg()" class="bg-white text-black px-8 py-3 rounded-xl font-bold">SEND</button>
        </div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const AD_LINK = "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec";
        
        // قائمة الألوان الأيونية
        const IONIC_COLORS = ["#00ffff", "#ff00ff", "#00ff88", "#ffcc00", "#ff3366"];

        firebase.initializeApp({ databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        setInterval(() => { 
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0'); 
        }, 1000);

        db.ref('vox_god_content').on('value', snap => {
            const feed = document.getElementById('video-feed');
            const adminList = document.getElementById('admin-list');
            feed.innerHTML = ''; adminList.innerHTML = '';
            const data = snap.val();
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const section = document.createElement('section');
                section.className = 'v-realm';
                section.innerHTML = `
                    <video id="vid-${id}" loop playsinline src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="sidebar-actions">
                        <div class="action-node" onclick="toggleMute(this, '${id}')"><i class="fas fa-volume-up"></i></div>
                        <div class="action-node" onclick="window.open('${AD_LINK}'); db.ref('vox_god_content/${id}/likes').transaction(l=>(l||0)+1)">
                            <i class="fas fa-heart text-red-500"></i><span>${v.likes || 0}</span>
                        </div>
                        <div class="action-node" onclick="window.open('${AD_LINK}'); toggleChat()"><i class="fas fa-comment-dots"></i></div>
                        <div class="action-node" onclick="window.open('${AD_LINK}'); navigator.share({url:window.location.href})"><i class="fas fa-paper-plane"></i></div>
                    </div>
                `;
                feed.appendChild(section);

                // إدارة مع صورة مصغرة
                const adminItem = document.createElement('div');
                adminItem.className = 'admin-item';
                adminItem.innerHTML = `
                    <div class="flex items-center gap-4">
                        <video class="admin-thumb" src="${v.url}#t=0.5"></video>
                        <span class="text-xs opacity-40 font-mono">${id.substring(0,8)}</span>
                    </div>
                    <button onclick="deleteContent('${id}')" class="text-red-500 text-xs font-bold px-4 py-2 bg-red-500/10 rounded-lg">REMOVE</button>
                `;
                adminList.appendChild(adminItem);
            });
            initObserver();
        });

        function updateIonicColor(index) {
            const color = IONIC_COLORS[index % IONIC_COLORS.length];
            document.documentElement.style.setProperty('--accent', color);
            document.getElementById('main-badge').style.color = color;
            document.getElementById('dynamic-wm').style.color = color + '44';
            document.getElementById('chat-btn').style.color = color;
        }

        function toggleMute(btn, id) {
            const v = document.getElementById('vid-'+id);
            v.muted = !v.muted;
            btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        }

        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dqzjfaqg4", uploadPreset: "vox_god",
            sources: ['local'], multiple: false, clientAllowedFormats: ["video"],
            styles: { palette: { window: "#000", windowBorder: "#00ffff", tabIcon: "#00ffff", action: "#ffffff", textLight: "#fff" } }
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('vox_god_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("up-trigger").onclick = () => myWidget.open();

        function toggleChat() { const c = document.getElementById('chat-ov'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function checkAdmin() { if(prompt("ACCESS_CODE:") === MASTER_KEY) toggleAdmin(); }
        function toggleAdmin() { const a = document.getElementById('admin-panel'); a.style.display = a.style.display==='flex'?'none':'flex'; }
        function deleteContent(id) { if(confirm("حذف هذا المقطع؟")) db.ref('vox_god_content/'+id).remove(); }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()) { db.ref('vox_chat').push({text: inp.value}); inp.value=''; }
        }

        db.ref('vox_chat').limitToLast(12).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => { box.innerHTML += `<div class="p-4 bg-white/5 rounded-2xl border-l-2 border-accent transition-all duration-500"><p class="text-sm opacity-80">${m.val().text}</p></div>`; });
            box.scrollTop = box.scrollHeight;
        });

        function initObserver() {
            let sectionIndex = 0;
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                        sectionIndex++;
                        updateIonicColor(sectionIndex); // تغيير اللون عند التمرير
                    } else {
                        v.pause(); v.currentTime = 0;
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-realm').forEach(s => obs.observe(s));
        }
    </script>
</body>
</html>
